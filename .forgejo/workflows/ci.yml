name: CI

on:
  push:
    branches: [main, live]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write


jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    container:
      image: registry.tokenet.de/shared/build-environments/default:latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: mkdir -p web/dist && touch web/dist/index.html
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: registry.tokenet.de/shared/build-environments/default:latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: mkdir -p web/dist && touch web/dist/index.html
      - run: cargo test --workspace

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    container:
      image: registry.tokenet.de/shared/build-environments/default:latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo deny check

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    container:
      image: registry.tokenet.de/shared/build-environments/default:latest
    steps:
      - uses: actions/checkout@v4
      - run: cd web && npm ci
      - run: cd web && npm audit --omit=dev || true
      - run: cd web && npx tsc --noEmit
      - run: cd web && npx vite build

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [check, test, frontend]
    steps:
      - name: Export CI environment
        run: |
          echo "IMAGE_PREFIX=$IMAGE_PREFIX" >> "$GITHUB_ENV"
          echo "REGISTRY_USERNAME=$REGISTRY_USERNAME" >> "$GITHUB_ENV"
          echo "REGISTRY_PASSWORD=$REGISTRY_PASSWORD" >> "$GITHUB_ENV"
          echo "REGISTRY_HOST=$REGISTRY_HOST" >> "$GITHUB_ENV"
          echo "NASFILES_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - uses: actions/checkout@v4
      - name: Write build metadata
        run: |
          {
            echo "NASFILES_BUILD_COMMIT=${GITHUB_SHA}"
            echo "NASFILES_BUILD_DATE=${NASFILES_BUILD_DATE}"
          } > build-info.env
      - name: Build & push image
        uses: https://git.tokenet.de/shared/build-actions/docker-build@main
        with:
          registry: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/live') && env.REGISTRY_HOST || '' }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}
          image: ${{ env.IMAGE_PREFIX }}
          tag: ${{ github.sha }},latest
          cache: 'false'
          build-args: |
            NASFILES_BUILD_COMMIT=${{ github.sha }}
            NASFILES_BUILD_DATE=${{ env.NASFILES_BUILD_DATE }}

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    container:
      image: registry.tokenet.de/shared/build-environments/default:latest
    needs: [docker]
    # Only cut releases from main, after the build (docker) has succeeded.
    # `live` deployments and pull requests never reach this job.
    if: github.ref == 'refs/heads/main'
    # Serialize releases so two pushes can never race to tag the same version.
    concurrency:
      group: nasfiles-release
      cancel-in-progress: false
    steps:
      # Fail fast with a clear message if the release credential is missing,
      # instead of a confusing git-auth error deep inside semantic-release.
      - name: Verify release token is configured
        env:
          SEMANTIC_RELEASE_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: |
          if [ -z "$SEMANTIC_RELEASE_TOKEN" ]; then
            echo "::error::SEMANTIC_RELEASE_TOKEN is not set. Create a repo secret with push access to the protected main branch and to tags."
            exit 1
          fi
      # Full history + tags are required so semantic-release can find the last
      # release and analyse every commit since it. Check out the *branch* (not a
      # detached SHA) so branch matching works even without CI auto-detection.
      # SEMANTIC_RELEASE_TOKEN must be able to push to protected main and tags.
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
      - name: Configure git identity
        run: |
          git config user.name "NASDrive Release Bot"
          git config user.email "release-bot@tokenet.de"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install release tooling
        run: npm ci --no-audit --no-fund
      # `--no-ci` forces a real release (never a silent dry-run) regardless of
      # whether env-ci recognises the Forgejo runner. Safe here because the job
      # is already gated to trusted pushes on main via the `if` above, and the
      # branch checkout above ensures the current branch resolves to `main`.
      - name: Run semantic-release
        env:
          # semantic-release/git pushes the release commit + tag through the
          # `origin` remote credentials configured by the checkout above.
          GIT_AUTHOR_NAME: NASDrive Release Bot
          GIT_AUTHOR_EMAIL: release-bot@tokenet.de
          GIT_COMMITTER_NAME: NASDrive Release Bot
          GIT_COMMITTER_EMAIL: release-bot@tokenet.de
        run: npx semantic-release --no-ci

  update-nas-image:
    name: Update NAS image
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/live'
    steps:
      - name: Export CI environment
        run: |
          echo "IMAGE_PREFIX=$IMAGE_PREFIX" >> "$GITHUB_ENV"
          echo "REGISTRY_HOST=$REGISTRY_HOST" >> "$GITHUB_ENV"
          echo "NAS_CONTROL_PULL_IMAGE_URL=$NAS_CONTROL_PULL_IMAGE_URL" >> "$GITHUB_ENV"
      - name: Update NAS image
        run: |
          IMAGE="${REGISTRY_HOST}/${IMAGE_PREFIX}:latest"
          BODY="$(mktemp)"

          echo "NAS update endpoint: ${NAS_CONTROL_PULL_IMAGE_URL:-<missing>}"
          echo "NAS update image: $IMAGE"
          echo "IMAGE_PREFIX=${IMAGE_PREFIX:-<missing>}"
          echo "REGISTRY_HOST=${REGISTRY_HOST:-<missing>}"

          STATUS="$(
            curl -sS \
              -o "$BODY" \
              -w "%{http_code}" \
              -X POST "$NAS_CONTROL_PULL_IMAGE_URL" \
              -H 'Content-Type: application/json' \
              --data "{\"image\":\"$IMAGE\"}"
          )"

          echo "NAS update status: $STATUS"
          echo "NAS update response:"
          cat "$BODY"
          echo

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            exit 1
          fi
