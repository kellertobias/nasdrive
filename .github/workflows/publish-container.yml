name: Build and publish container

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nasdrive

jobs:
  container:
    name: Build and publish NASDrive image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set build date
        id: build
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=NASDrive
            org.opencontainers.image.description=NASDrive self-hosted web file manager
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            NASFILES_BUILD_COMMIT=${{ github.sha }}
            NASFILES_BUILD_DATE=${{ steps.build.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Runs only for the tag pushed (and mirrored) after the Forgejo
      # semantic-release job. The container above was already built and pushed
      # to GHCR under this version; the release notes link straight to it.
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Container image

            This release is published to the GitHub Container Registry:

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.metadata.outputs.version }}
            ```

            This image is also tagged with the matching `MAJOR.MINOR` alias, and
            `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest` tracks the newest release.
            All published tags are listed at
            https://github.com/${{ github.repository }}/pkgs/container/nasdrive

            ---
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
